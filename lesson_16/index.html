<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/css/reset.css" />
    <link rel="stylesheet" href="./styles/css/style.css" />
    <title>Final Project</title>
  </head>
  <body>
    <header class="header">
      <div class="header__container">
        <section class="header__top">
          <nav class="header__left">
            <div class="header__logo">
              <img src="./images/logo.png" alt="Logo" />
            </div>
            <div class="header__social">
              <ul class="header__social-list">
                <li class="header__social-item">
                  <a class="header__social-link" href="#">
                    <svg class="header__icon">
                      <use href="./images/sprite.svg#whats_up"></use>
                    </svg>
                  </a>
                </li>
                <li class="header__social-item">
                  <a class="header__social-link" href="#">
                    <svg class="header__icon">
                      <use href="./images/sprite.svg#facebook"></use>
                    </svg>
                  </a>
                </li>
                <li class="header__social-item">
                  <a class="header__social-link" href="#">
                    <svg class="header__icon">
                      <use href="./images/sprite.svg#insta"></use>
                    </svg>
                  </a>
                </li>
                <li class="header__social-item">
                  <a class="header__social-link" href="#">
                    <svg class="header__icon">
                      <use href="./images/sprite.svg#telegram"></use>
                    </svg>
                  </a>
                </li>
                <li class="header__social-item">
                  <a class="header__social-link" href="#">
                    <svg class="header__icon">
                      <use href="./images/sprite.svg#youtube"></use>
                    </svg>
                  </a>
                </li>
              </ul>
            </div>
          </nav>
          <nav class="header__right">
            <ul class="header__misc-list">
              <li class="header__misc-item">
                <a class="header__misc-link" href="#">
                  <div class="header__misc-inner-container">
                    <svg class="header__icon">
                      <use href="./images/sprite.svg#phone"></use>
                    </svg>
                    <span class="text-lg">+34 641 35 22 51</span>
                  </div>
                </a>
              </li>
              <li class="header__misc-item">
                <a class="header__misc-link" href="#">
                  <div class="header__misc-inner-container">
                    <svg class="header__icon">
                      <use href="./images/sprite.svg#location"></use>
                    </svg>
                    <span class="text-lg">Carrer de Béjar, 38, Barcelona</span>
                  </div>
                </a>
              </li>
              <li class="header__misc-item">
                <a class="header__misc-link" href="#">
                  <div class="header__misc-inner-container">
                    <span class="text-lg">UKR</span>
                    <svg class="header__icon">
                      <use href="./images/sprite.svg#arrow"></use>
                    </svg>
                  </div>
                </a>
              </li>
            </ul>
          </nav>
        </section>
      </div>
      <section class="header__bottom">
        <nav class="header__sections">
          <ul class="header__sections-list">
            <li class="header__sections-item">
              <a class="header__sections-link" href="#">
                <span class="text-xl">Наші напрямки</span>
                <svg class="header__icon">
                  <use href="./images/sprite.svg#arrow"></use>
                </svg>
              </a>
            </li>
            <li class="header__sections-item">
              <a class="header__sections-link" href="#">
                <span class="text-xl">Наші партнери</span>
              </a>
            </li>
            <li class="header__sections-item">
              <a class="header__sections-link" href="#">
                <span class="text-xl">Звіти</span>
              </a>
            </li>
            <li class="header__sections-item">
              <a class="header__sections-link" href="#">
                <span class="text-xl">Новини</span>
              </a>
            </li>
            <li class="header__sections-item">
              <a class="header__sections-link" href="#">
                <span class="text-xl">Контакти</span>
              </a>
            </li>
          </ul>
        </nav>
      </section>
    </header>
  </body>
</html>
